name: Lint Project
on: [push]

jobs:
  lint-luacheck:
    runs-on: ubuntu-latest
    name: Luacheck linting
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Luacheck for lua codebases
        uses: RagedUnicorn/action-luacheck@v2.0.1
        with:
          files: code localization
